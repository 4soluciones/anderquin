{% extends 'home.html' %}
{% load static %}

{% block title %}
    Listado de Órdenes de Compra
{% endblock title %}

{% block body %}

    <div class="container-fluid py-2 roboto-condensed-regular bg-light" style="min-height: 100vh;">
        <div class="card border-0 shadow-lg overflow-hidden" style="border-radius: 15px;">
            <div class="card-body border-bottom py-2 py-md-3 roboto-condensed-regular" style="background: linear-gradient(135deg, #3e6787 0%, #2c4a63 100%);">
                <div class="row align-items-center no-gutters">
                    <div class="col-12 col-lg-6 mb-2 mb-lg-0">
                        <h4 class="card-title text-left text-white roboto-condensed-regular mb-0 font-weight-bold">
                            <i class="fas fa-shopping-cart mr-2"></i>Listado de Órdenes de Compra
                        </h4>
                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="d-flex flex-wrap align-items-center justify-content-lg-end gap-2">
                            <label for="year_search" class="mb-0 mr-2 text-white small font-weight-bold text-uppercase" style="font-size: 0.8rem;">Año:</label>
                            <select class="form-control form-control-sm shadow-sm border-0 rounded-pill" id="year_search" name="year-search" required style="max-width: 120px; border-color: rgba(255,255,255,0.3) !important;">
                                <option disabled value="0">Seleccione</option>
                                <option value="2025" {% if current_year == 2025 %}selected{% endif %}>2025</option>
                                <option value="2026" {% if current_year == 2026 %}selected{% endif %}>2026</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <form id="report-form" action="{% url 'buys:buy_order_list' %}" method="POST">
                {% csrf_token %}
                <input type="hidden" name="value" id="value-field">
                <div class="card-body py-3 px-3 px-md-4" style="background-color: #f8f9fa; border-bottom: 1px solid #e9ecef;">
                    <div class="d-flex flex-wrap gap-2 justify-content-center justify-content-md-start">
                        <button type="button" class="btn btn-sm roboto-condensed-regular btn-outline-primary border-2 rounded-pill px-3 py-2" onclick="sendOption('T')">
                            <i class="fas fa-list mr-1"></i>Todos
                        </button>
                        <button type="button" class="btn btn-sm roboto-condensed-regular btn-outline-success border-2 rounded-pill px-3 py-2" onclick="sendOption('A')">
                            <i class="fas fa-warehouse mr-1"></i>En Almacén
                        </button>
                        <button type="button" class="btn btn-sm roboto-condensed-regular btn-outline-warning border-2 rounded-pill px-3 py-2" onclick="sendOption('S')">
                            <i class="fas fa-clock mr-1"></i>Sin Almacén
                        </button>
                        <button type="button" class="btn btn-sm roboto-condensed-regular btn-outline-danger border-2 rounded-pill px-3 py-2" onclick="sendOption('N')">
                            <i class="fas fa-ban mr-1"></i>Anulados
                        </button>
                    </div>
                </div>
            </form>
            <div class="loader-container col-auto" id="loader-bill" style="display: none; opacity: 1.5; width: 100%; padding-top: 3em;">
                <div class="loader"></div>
            </div>
            <div class="card-body p-0 p-md-3 bg-light" id="purchase-grid-list"></div>
        </div>
    </div>

    <div class="modal fade" id="assignment" data-backdrop="static" data-keyboard="false"
         tabindex="-1" role="dialog" aria-labelledby="ModalHelpTitle"
         aria-hidden="true"></div>

    <div class="modal fade" id="modal-credit-note" tabindex="-1" role="dialog"
         aria-labelledby="ModalHelpTitle"
         aria-hidden="true"></div>

    {#    <div class="modal fade" id="modal-assign-store" tabindex="-1" role="dialog"#}
    {#         aria-labelledby="ModalHelpTitle"#}
    {#         aria-hidden="true"></div>#}

    <style>
        .input-icon {
            position: relative;
        }

        .input-icon > i {
            position: absolute;
            display: block;
            transform: translate(0, -50%);
            top: 50%;
            pointer-events: none;
            width: 25px;
            text-align: center;
            font-style: normal;
        }

        .input-icon > input {
            padding-left: 25px;
            padding-right: 8px;
        }

        .input-icon-right > i {
            right: 0;
        }

        .input-icon-right > input {
            padding-left: 0;
            padding-right: 25px;
            text-align: right;
        }

    </style>

{% endblock body %}

    <script type="text/javascript">

        loader = '<div class="container">' +
            '<div class="row">' +
            '<div class="col-md-12">' +
            '<div class="loader">' +
            '<p><strong>Cargando..</strong></p>' +
            '<div class="loader-inner"></div>' +

        function sendOption(value) {
            let data = new FormData($('#report-form').get(0));
            $('#purchase-grid-list').empty();
            $('#loader-bill').html(loader).show()
            let search_year = $('#year_search').val();
            if (search_year === null){
                toastr.warning("SELECCIONE EL AÑO DE BUSQUEDA", '¡ERROR DE ESCRITURA!');
                $('#loader-bill').hide();
                return false
            }
            data.append('year', search_year);
            data.append('value', value);
            $.ajax({
                url: '/buys/buy_order_list/',
                async: true,
                dataType: 'json', // for response
                type: 'POST',
                cache: false,
                processData: false,
                data: data,
                contentType: false,
                headers: {"X-CSRFToken": '{{ csrf_token }}'},
                success: function (response, textStatus, xhr) {
                    if (xhr.status === 200) {
                        $('#purchase-grid-list').html(response.grid);
                        $('#loader-bill').hide();
                    }
                },
                error: function (jqXhr, textStatus, xhr) {
                    toastr.error(jqXhr.responseJSON.error, '¡ERROR!');
                    $('#loader-bill').hide();
                }
            });
        }
